<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Настройки — Tablo Kanban</title>
  <link rel="stylesheet" href="../css/options.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>Настройки Tablo Kanban</h1>
    </header>

    <nav id="settings-tabs">
      <button class="tab-btn active" data-tab="tags">Теги</button>
      <button class="tab-btn" data-tab="performers">Исполнители</button>
      <button class="tab-btn" data-tab="authors">Авторы</button>
      <button class="tab-btn" data-tab="appearance">Внешний вид</button>
      <button class="tab-btn" data-tab="about">О расширении</button>
    </nav>

    <main>
      <!-- Tags Tab -->
      <div id="tab-tags" class="tab-content active">
        <div id="tags-list"></div>
        <button id="add-tag-option" class="btn-primary">Добавить тег</button>
      </div>

      <!-- Performers Tab -->
      <div id="tab-performers" class="tab-content">
        <div id="performers-list"></div>
        <button id="add-performer-option" class="btn-primary">Добавить исполнителя</button>
      </div>

      <!-- Authors Tab -->
      <div id="tab-authors" class="tab-content">
        <div id="authors-list"></div>
        <button id="add-author-option" class="btn-primary">Добавить автора</button>
      </div>

      <!-- Appearance Tab -->
      <div id="tab-appearance" class="tab-content">
        <div class="setting-group">
          <h3>Тема</h3>
          <div class="radio-group">
            <label class="radio-label">
              <input type="radio" name="theme" value="light">
              <span>Светлая</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="theme" value="dark">
              <span>Тёмная</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="theme" value="system">
              <span>Системная</span>
            </label>
          </div>
        </div>

        <div class="setting-group">
          <h3>Размер карточек</h3>
          <div class="radio-group">
            <label class="radio-label">
              <input type="radio" name="card-size" value="compact">
              <span>Компактный</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="card-size" value="standard">
              <span>Стандартный</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="card-size" value="large">
              <span>Большой</span>
            </label>
          </div>
        </div>
      </div>

      <!-- About Tab -->
      <div id="tab-about" class="tab-content">
        <div class="setting-group">
          <h3>Tablo Kanban</h3>
          <p>Версия 1.0.0</p>
          <p>Панель закладок и канбан-доска для новой вкладки Chrome.</p>
          <p>Настройки хранятся локально в вашем браузере.</p>
        </div>
      </div>
    </main>

    <footer>
      <button id="save-options" class="btn-primary">Сохранить</button>
    </footer>
  </div>

  <script src="../js/storage.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/options.js"></script>
</body>
</html>
