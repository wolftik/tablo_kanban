<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Новая вкладка</title>
  <link rel="stylesheet" href="../css/bookmarks.css">
  <link rel="stylesheet" href="../css/kanban.css">
</head>
<body>
  <div id="app">
    <!-- Bookmarks Bar -->
    <div id="bookmarks-bar">
      <div id="bookmarks-container" class="bookmarks-grid"></div>
      <button id="add-bookmark-btn" title="Добавить закладку">+</button>
    </div>

    <!-- Add Bookmark Modal -->
    <div id="add-bookmark-modal" class="modal-overlay" style="display:none">
      <div class="modal">
        <h3>Добавить закладку</h3>
        <input type="text" id="bookmark-url" placeholder="URL (https://example.com)">
        <input type="text" id="bookmark-title" placeholder="Название">
        <div class="modal-actions">
          <button id="bookmark-cancel">Отмена</button>
          <button id="bookmark-save">Сохранить</button>
        </div>
      </div>
    </div>

    <!-- Kanban Board -->
    <div id="kanban-filter">
      <input type="text" id="filter-search" placeholder="Поиск задач..." class="filter-input">
      <select id="filter-assignee" class="filter-select">
        <option value="">Все исполнители</option>
      </select>
      <select id="filter-tags" class="filter-select" multiple>
        <option value="">Все теги</option>
      </select>
      <button id="filter-clear" class="filter-clear-btn" title="Очистить фильтры">&#10005;</button>
    </div>
    <div id="kanban-board"></div>

    <!-- Edit Card Modal -->
    <div id="edit-card-modal" class="modal-overlay" style="display:none">
      <div class="modal">
        <h3 id="modal-title">Задача</h3>
        <input type="text" id="card-title-input" placeholder="Название задачи">
        <textarea id="card-desc-input" placeholder="Описание" rows="3"></textarea>
        <input type="text" id="card-assignee-input" placeholder="Исполнитель">
        <div id="card-tags-container">
          <span class="tags-label">Теги:</span>
          <div id="card-tags-selector"></div>
        </div>
        <select id="card-priority-select">
          <option value="">Без приоритета</option>
          <option value="low">Низкий</option>
          <option value="medium">Средний</option>
          <option value="high">Высокий</option>
          <option value="urgent">Срочный</option>
        </select>
        <div class="modal-actions">
          <button id="card-delete-btn" class="btn-danger" style="margin-right:auto">Удалить</button>
          <button id="card-cancel">Отмена</button>
          <button id="card-save">Сохранить</button>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/storage.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/bookmarks.js"></script>
  <script src="../js/kanban.js"></script>
  <script src="../js/newtab.js"></script>
</body>
</html>
