<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="app.name">Новая вкладка</title>
  <!-- CSS order matters: bookmarks.css (global/layout) → widgets.css → kanban.css (overrides) -->
  <link rel="stylesheet" href="../css/bookmarks.css">
  <link rel="stylesheet" href="../css/widgets.css">
  <link rel="stylesheet" href="../css/kanban.css">
  <link rel="preconnect" href="https://www.google.com" crossorigin>
</head>
<body>
  <div id="app">
    <!-- Head Bar -->
    <div id="head-bar">
      <div id="bookmarks-container" class="bookmarks-grid"></div>
      <div id="widgets-zone" class="widgets-zone"></div>
      <div id="settings-btn-wrapper">
        <button id="settings-btn" data-i18n-title="settings.title">
          <span class="settings-icon">&#9881;</span>
        </button>
        <div id="mini-widgets-group"></div>
        <button id="homepage-info-btn" data-i18n-title="homepage.hint">
          <span class="settings-icon">&#9432;</span>
        </button>
      </div>
    </div>

    <!-- Add Bookmark Modal -->
    <div id="add-bookmark-modal" class="modal-overlay" style="display:none">
      <div class="modal">
        <h3 data-i18n="bookmark.add.title">Добавить закладку</h3>
        <input type="text" id="bookmark-url" data-i18n-placeholder="bookmark.url.placeholder" placeholder="URL (https://example.com)">
        <input type="text" id="bookmark-title" data-i18n-placeholder="bookmark.title.placeholder" placeholder="Название">
        <div class="modal-actions">
          <button id="bookmark-cancel" data-i18n="bookmark.cancel">Отмена</button>
          <button id="bookmark-save" data-i18n="bookmark.save">Сохранить</button>
        </div>
      </div>
    </div>

    <!-- Kanban Board -->
    <div id="kanban-filter">
      <select id="filter-assignee" class="filter-select">
        <option value="" data-i18n="filter.all.assignees">Все исполнители</option>
      </select>
      <select id="filter-author" class="filter-select">
        <option value="" data-i18n="filter.all.authors">Все авторы</option>
      </select>
      <select id="filter-priority" class="filter-select">
        <option value="" data-i18n="filter.all.priorities">Все приоритеты</option>
        <option value="low" data-i18n="priority.low">Низкий</option>
        <option value="medium" data-i18n="priority.medium">Средний</option>
        <option value="high" data-i18n="priority.high">Высокий</option>
        <option value="urgent" data-i18n="priority.urgent">Срочный</option>
      </select>
      <div class="filter-tags-wrapper">
        <span id="filter-tags-label" class="filter-tags-label" data-i18n="tags.filter.all">Все теги</span>
        <div id="filter-tags-dropdown" class="filter-tags-dropdown" style="display:none">
          <div id="filter-tags-list" class="filter-tags-list"></div>
        </div>
      </div>
      <div class="filter-date-range">
        <input type="date" id="filter-date-from" class="filter-date-input" data-i18n-title="filter.date.from">
        <span class="filter-date-sep">&mdash;</span>
        <input type="date" id="filter-date-to" class="filter-date-input" data-i18n-title="filter.date.to">
      </div>
      <input type="text" id="filter-search" data-i18n-placeholder="filter.search.placeholder" placeholder="Поиск задач..." class="filter-input">
      <button id="filter-clear" class="filter-clear-btn" data-i18n-title="filter.clear.title" title="Очистить фильтры">&#10005;</button>
    </div>
    <div id="kanban-board"></div>

    <!-- Edit Card Modal -->
    <div id="edit-card-modal" class="modal-overlay" style="display:none">
      <div class="modal edit-card-modal-inner">
        <h3 id="modal-title" data-i18n="modal.task">Задача</h3>

        <!-- Title -->
        <input type="text" id="card-title-input" data-i18n-placeholder="modal.title.placeholder" placeholder="Название задачи" maxlength="200">

        <!-- Description block -->
        <div class="card-section">
          <div class="card-section-heading" data-i18n="cardDescHeading">Описание</div>
          <div class="desc-editor-wrapper">
            <div class="desc-toolbar">
              <div class="tb-left">
                <button type="button" class="tb-btn tb-bold" data-cmd="bold" data-i18n-title="cardDescBoldTooltip" title="Жирный (Ctrl+B)"><b>B</b></button>
                <button type="button" class="tb-btn tb-italic" data-cmd="italic" data-i18n-title="cardDescItalicTooltip" title="Курсив (Ctrl+I)"><i>I</i></button>
                <span class="tb-sep"></span>
                <button type="button" class="tb-btn" data-cmd="insertUnorderedList" data-i18n-title="cardDescUlTooltip" title="Маркированный список">•≡</button>
                <button type="button" class="tb-btn" data-cmd="insertOrderedList" data-i18n-title="cardDescOlTooltip" title="Нумерованный список">1≡</button>
                <span class="tb-sep"></span>
                <button type="button" class="tb-btn" data-cmd="quote" data-i18n-title="cardDescQuoteTooltip" title="Цитата">❝</button>
                <span class="tb-sep"></span>
                <button type="button" class="tb-btn" data-cmd="link" title="Вставить ссылку">🔗</button>
              </div>
              <span id="char-counter" class="char-counter">0 / 10000</span>
            </div>
            <div id="card-desc-editor" class="desc-editor" contenteditable="true" data-placeholder="Описание"></div>
          </div>
        </div>

        <!-- Checklist block -->
        <div class="card-section">
          <div class="card-section-heading" data-i18n="cardChecklistHeading">Чек-лист</div>
          <div id="checklist-progress-bar" class="checklist-editor-progress" style="display:none">
            <div id="checklist-progress-fill" class="checklist-editor-progress-fill"></div>
          </div>
          <div id="checklist-progress-text" class="checklist-progress-text" style="display:none"></div>
          <div id="checklist-tree" class="checklist-tree"></div>
          <button type="button" id="checklist-add-btn" class="checklist-add-btn" data-i18n="cardChecklistAdd">+ Добавить пункт</button>
        </div>

        <!-- Properties block -->
        <div class="card-section">
          <span class="tags-label" data-i18n="modal.assignee">Исполнитель:</span>
          <select id="card-assignee-select">
            <option value="" data-i18n="modal.not.assigned">Не назначен</option>
          </select>
          <span class="tags-label" data-i18n="modal.author">Автор:</span>
          <select id="card-author-select">
            <option value="" data-i18n="modal.not.specified">Не указан</option>
          </select>
          <div id="card-tags-container">
            <span class="tags-label" data-i18n="modal.tags">Теги:</span>
            <div id="card-tags-dropdown-wrapper">
              <div id="card-tags-display" class="tags-display" data-i18n-title="modal.tags.select" title="Выбрать теги">
                <span class="tags-placeholder" data-i18n="card.tags.placeholder">Все теги</span>
              </div>
              <div id="card-tags-dropdown" class="tags-dropdown">
                <div class="card-tags-dropdown-header">
                  <span data-i18n="card.tags.dropdown.header">Выберите теги</span>
                  <button id="tags-dropdown-clear" class="tags-dropdown-clear" data-i18n-title="card.tags.dropdown.clear" data-i18n="card.tags.dropdown.clear" title="Очистить">Очистить</button>
                </div>
                <div id="card-tags-selected" class="card-tags-selected"></div>
                <div id="card-tags-selector" class="tags-dropdown-list"></div>
              </div>
            </div>
          </div>
          <span class="tags-label" data-i18n="modal.priority">Приоритет:</span>
          <select id="card-priority-select">
            <option value="" data-i18n="modal.no.priority">Без приоритета</option>
            <option value="low" data-i18n="priority.low">Низкий</option>
            <option value="medium" data-i18n="priority.medium">Средний</option>
            <option value="high" data-i18n="priority.high">Высокий</option>
            <option value="urgent" data-i18n="priority.urgent">Срочный</option>
          </select>
        </div>

        <div class="modal-actions">
          <button id="card-delete-btn" class="btn-danger" style="margin-right:auto" data-i18n="modal.delete">Удалить</button>
          <button id="card-cancel" data-i18n="modal.cancel">Отмена</button>
          <button id="card-edit-btn" style="display:none" data-i18n="modal.edit">Редактировать</button>
          <button id="card-save" data-i18n="modal.save">Сохранить</button>
        </div>
      </div>
    </div>

    <!-- Add Column Modal -->
    <div id="add-column-modal" class="modal-overlay" style="display:none">
      <div class="modal">
        <h3 data-i18n="column.add.title">Новая колонка</h3>
        <input type="text" id="new-column-title" data-i18n-placeholder="column.new.placeholder" placeholder="Название колонки" maxlength="100">
        <div class="new-column-color-row">
          <label for="new-column-color" data-i18n="column.new.color">Цвет:</label>
          <input type="color" id="new-column-color" value="#6366f1">
        </div>
        <div class="modal-actions">
          <button id="new-column-cancel" class="btn-secondary" data-i18n="modal.cancel">Отмена</button>
          <button id="new-column-save" class="btn-primary" data-i18n="column.add.create">Создать</button>
        </div>
      </div>
    </div>

    <!-- Homepage Info Modal -->
    <div id="homepage-modal" class="modal-overlay" style="display:none">
      <div class="modal" style="max-width:500px">
        <h3 data-i18n="homepage.modal.title">Установка страницы быстрого доступа</h3>
        <p data-i18n="homepage.modal.desc" style="color:var(--bookmark-text);font-size:14px;line-height:1.5;margin:12px 0">
          Скопируйте URL и вставьте его в настройках браузера как страницу быстрого доступа
        </p>
        <div style="display:flex;gap:8px;align-items:center">
          <input type="text" id="homepage-url-input" readonly style="flex:1;cursor:text">
          <button id="homepage-copy-btn" style="background:#6366f1;color:#fff;border:none;border-radius:6px;padding:8px 16px;cursor:pointer;font-size:14px;font-weight:500;white-space:nowrap" data-i18n="homepage.modal.copy">Копировать</button>
        </div>
        <div class="modal-actions">
          <button id="homepage-modal-close" data-i18n="homepage.modal.close">Закрыть</button>
        </div>
      </div>
  </div>

  <script defer src="../js/i18n.js"></script>
  <script defer src="../js/utils.js"></script>
  <script defer src="../js/storage-sync.js"></script>
  <script defer src="../js/storage-local.js"></script>
  <script defer src="../js/drive-sync.js"></script>
  <script defer src="../js/yadisk-sync.js"></script>
  <script defer src="../js/sync-provider.js"></script>
  <script defer src="../js/storage-manager.js"></script>
  <script defer src="../js/kanban-constants.js"></script>
  <script defer src="../js/kanban-filter.js"></script>
  <script defer src="../js/kanban-card.js"></script>
  <script defer src="../js/kanban-store.js"></script>
  <script defer src="../js/kanban-renderer.js"></script>
  <script defer src="../js/kanban-dnd.js"></script>
  <script defer src="../js/weather-providers.js"></script>
  <script defer src="../js/quotes-providers.js"></script>
  <script defer src="../js/widget-system.js"></script>
  <script defer src="../js/widget-coin.js"></script>
  <script defer src="../js/widget-pomodoro.js"></script>
  <script defer src="../js/widget-8ball.js"></script>
  <script defer src="../js/widget-alarm-timer.js"></script>
  <script defer src="../js/bookmarks-context-menu.js"></script>
  <script defer src="../js/bookmarks.js"></script>
  <script defer src="../js/kanban.js"></script>
  <script defer src="../js/newtab.js"></script>
</body>
</html>
